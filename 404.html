<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found - Certified Slop">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - Page Not Found | Certified Slop</title>
    <link rel="icon" type="image/x-icon" href="https://avatars.githubusercontent.com/u/265597819?v=4">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0f0f11',
                        secondary: '#18181b',
                        card: '#202025',
                    },
                    animation: {
                        'gradient': 'gradient 15s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        gradient: {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                    },
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
        html { scroll-behavior: smooth; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-primary text-white min-h-screen flex flex-col" x-data="{ typedText: '', fullText: 'This is not the slop you\'re looking for.' }" x-init="setTimeout(() => { let i = 0; const interval = setInterval(() => { typedText = fullText.slice(0, i + 1); i++; if (i >= fullText.length) clearInterval(interval); }, 50); }, 500)">

    <!-- Background -->
    <div class="fixed inset-0 bg-gradient-to-br from-purple-900/40 via-primary to-blue-900/40 bg-[length:200%_200%] animate-gradient"></div>

    <!-- Main Content -->
    <main class="relative flex-1 flex items-center justify-center px-4">
        <div class="text-center max-w-2xl">
            <!-- Animated 404 -->
            <div class="relative mb-8">
                <div class="absolute inset-0 bg-gradient-to-r from-purple-500 to-pink-500 rounded-full blur-3xl opacity-20"></div>
                <h1 class="relative text-8xl sm:text-9xl lg:text-[12rem] font-bold bg-gradient-to-r from-purple-400 via-pink-400 to-blue-400 bg-clip-text text-transparent animate-float">
                    404
                </h1>
            </div>

            <!-- Typing Effect -->
            <p class="text-xl sm:text-2xl text-gray-400 mb-8 min-h-[2rem]">
                <span x-text="typedText"></span><span class="animate-pulse">|</span>
            </p>

            <!-- Description -->
            <p class="text-gray-500 mb-12 max-w-md mx-auto">
                Looks like we've run out of slop in this part of the internet. 
                Let's get you back to where the real slop lives.
            </p>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="/"
                   class="inline-flex items-center justify-center gap-2 px-8 py-4 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-semibold rounded-xl transition-all hover:scale-105 shadow-lg shadow-purple-500/30">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                    Back to Home
                </a>
                <a href="https://github.com/CertifiedSlop" target="_blank" rel="noopener noreferrer"
                   class="inline-flex items-center justify-center gap-2 px-8 py-4 bg-secondary/80 hover:bg-secondary border border-white/10 hover:border-white/20 text-white font-semibold rounded-xl transition-all hover:scale-105">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                    GitHub
                </a>
            </div>

            <!-- Fun Stats -->
            <div class="mt-16 grid grid-cols-3 gap-4 max-w-md mx-auto">
                <div class="bg-card/50 backdrop-blur-sm rounded-xl p-4 border border-white/10">
                    <p class="text-2xl font-bold text-purple-400">0</p>
                    <p class="text-xs text-gray-500">Slop Found</p>
                </div>
                <div class="bg-card/50 backdrop-blur-sm rounded-xl p-4 border border-white/10">
                    <p class="text-2xl font-bold text-pink-400">404</p>
                    <p class="text-xs text-gray-500">Error Level</p>
                </div>
                <div class="bg-card/50 backdrop-blur-sm rounded-xl p-4 border border-white/10">
                    <p class="text-2xl font-bold text-blue-400">∞</p>
                    <p class="text-xs text-gray-500">Slop Elsewhere</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="relative bg-secondary/50 backdrop-blur-sm border-t border-white/10 py-6">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-500 text-sm">
                &copy; <script>document.write(new Date().getFullYear())</script> Certified Slop. All rights reserved.
            </p>
            <p class="text-gray-600 text-xs mt-2">
                Made with ❤️ and too much AI
            </p>
        </div>
    </footer>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>
